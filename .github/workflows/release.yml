# Release multi-plataforma do HyperFrame.
# Dispara ao criar uma tag v* (ex.: v0.2.13) ou manualmente (workflow_dispatch).
# Gera: macOS (Apple Silicon + Intel), Windows x64 (NSIS .exe) e Linux
# (AppImage + .deb), publica tudo num GitHub Release com checksums.
name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-latest
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: appimage,deb
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      # dependências de sistema do Tauri no Linux (webkit2gtk etc.)
      - name: deps linux
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev

      - run: npm ci

      - name: testes do engine (gate)
        run: npm test

      - name: build
        run: npx tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
        working-directory: apps/desktop

      - name: checksums
        shell: bash
        run: |
          cd apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle
          find . -type f \( -name '*.dmg' -o -name '*setup.exe' -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec shasum -a 256 {} \; > SHA256SUMS-${{ matrix.target }}.txt
          cat SHA256SUMS-${{ matrix.target }}.txt

      - name: publicar no release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          files: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/SHA256SUMS-*.txt
